# netlify.toml
# Place this file in the root of your repository.

[build]
  # Where your dashboard React app lives after build
  publish = "dist"
  # Where your Netlify Functions live
  functions = "netlify/functions"
  # Build command (adjust if using Vite, CRA, etc.)
  command = "npm run build"

# ── Function-specific settings ────────────────────────────────────────────────

[functions]
  # Use Node 20 for all functions
  node_bundler = "esbuild"

[functions."homebot-webhook"]
  timeout = 26

[functions."get-clients"]
  timeout = 26

[functions."sync-clients"]
  timeout = 26

[functions."enrich-clients"]
  timeout = 26

[functions."add-partner"]
  timeout = 26

[functions."create-client"]
  timeout = 26

[functions."log-outreach"]
  timeout = 26

# ── Redirects ─────────────────────────────────────────────────────────────────

# Route all non-function requests to the React app (SPA fallback)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Environment variable hints (set real values in Netlify dashboard) ─────────
# Do NOT put real secrets here. This is just documentation.
#
# Required environment variables to set in Netlify → Site Settings → Environment:
#
#   WEBHOOK_SECRET        = a long random string, must match what you put in Zapier
#   NETLIFY_BLOBS_TOKEN   = auto-provided by Netlify, no action needed
#
# Optional:
#   NODE_ENV              = production
